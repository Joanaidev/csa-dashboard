<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bitwave · Solutions Overview</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0d0f12;--ink2:#3d4149;--ink3:#8b909a;--ink4:#b8bcc4;
  --bg:#f4f5f7;--surface:#fff;--surface2:#f0f1f4;--surface3:#e6e8ed;
  --blue:#1a56db;--blue-soft:#eef2ff;--blue-mid:#c7d7fd;
  --green:#0e9f6e;--green-soft:#ecfdf5;
  --red:#e02424;--red-soft:#fef2f2;
  --amber:#d97706;--amber-soft:#fffbeb;--amber-mid:#fde68a;
  --purple:#7c3aed;--purple-soft:#f5f3ff;
  --border:rgba(0,0,0,.06);--border2:rgba(0,0,0,.1);
  --shadow:0 1px 2px rgba(0,0,0,.05),0 1px 4px rgba(0,0,0,.04);
  --shadow-md:0 4px 20px rgba(0,0,0,.07);
  --r:10px;--r-lg:16px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);font-size:14px;min-height:100vh;transition:background .2s,color .2s}
body.dark{
  --ink:#f1f3f5;--ink2:#c9cdd4;--ink3:#6e7681;--ink4:#484f58;
  --bg:#0d1117;--surface:#161b22;--surface2:#21262d;--surface3:#30363d;
  --blue:#58a6ff;--blue-soft:#1f3a5f;--blue-mid:#1f4a7a;
  --green:#3fb950;--green-soft:#1a3a2a;--green-mid:#2ea043;
  --red:#f85149;--red-soft:#3d1a1a;--red-mid:#6e2626;
  --amber:#d29922;--amber-soft:#3d2e0a;--amber-mid:#6e5210;
  --purple:#bc8cff;--purple-soft:#2d1f47;
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.15);
  --shadow:0 1px 3px rgba(0,0,0,.3);--shadow-md:0 4px 16px rgba(0,0,0,.4);
}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:10px}

.topbar{background:rgba(255,255,255,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);height:56px;padding:0 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.brand{display:flex;align-items:center;gap:10px}
.brand-mark{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#1a56db,#6875f5);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(26,86,219,.3)}
.brand-name{font-size:15px;font-weight:600;letter-spacing:-.02em}
.brand-name span{color:var(--blue);font-weight:700}
.topbar-right{display:flex;align-items:center;gap:12px}
.person-sel{background:var(--surface);border:1.5px solid var(--blue-mid);border-radius:10px;padding:8px 16px;font-size:14px;font-weight:600;color:var(--blue);outline:none;font-family:inherit;cursor:pointer;min-width:180px;box-shadow:0 0 0 3px rgba(26,86,219,.08)}
.back-btn{background:none;border:1px solid var(--border2);color:var(--ink2);border-radius:8px;padding:6px 14px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;text-decoration:none;display:flex;align-items:center;gap:5px}
.back-btn:hover{background:var(--surface2)}
.live-badge{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--ink3);background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 10px}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(14,159,110,.4)}70%{box-shadow:0 0 0 6px rgba(14,159,110,0)}}

.page{padding:28px 32px;max-width:1400px;margin:0 auto}

/* HERO NAME */
.hero-name{display:flex;align-items:center;gap:14px;margin-bottom:24px}
.hero-av{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;flex-shrink:0}
.hero-title{font-size:24px;font-weight:700;letter-spacing:-.03em}
.hero-sub{font-size:13px;color:var(--ink3);margin-top:2px}

/* BIG NUMBERS */
.big-nums{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px}
.bn{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:24px 26px;position:relative;overflow:hidden;transition:all .25s;box-shadow:var(--shadow)}
.bn::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.bn.blue::before{background:var(--blue)}
.bn.green::before{background:var(--green)}
.bn.red::before{background:var(--red)}
.bn.amber::before{background:var(--amber)}
.bn.purple::before{background:var(--purple)}
.bn-num{font-size:34px;font-weight:700;font-family:'DM Mono',monospace;letter-spacing:-.04em;margin-bottom:4px;line-height:1}
.bn-num.blue{color:var(--blue)}.bn-num.green{color:var(--green)}.bn-num.red{color:var(--red)}.bn-num.amber{color:var(--amber)}.bn-num.purple{color:var(--purple)}
.bn-label{font-size:11px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.07em}
.bn-sub{font-size:12px;color:var(--ink4);margin-top:4px}
.bn-icon{position:absolute;bottom:16px;right:20px;font-size:28px;opacity:.08}

/* SECTIONS */
.sections{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.sections.wide{grid-template-columns:1fr}
.section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow)}
.sec-hdr{padding:16px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface2)}
.sec-title{font-size:12px;font-weight:700;color:var(--ink);letter-spacing:.02em;text-transform:uppercase}
.sec-count{font-size:11px;font-weight:600;color:var(--ink3);background:var(--surface3);padding:2px 8px;border-radius:10px}
.sec-body{padding:0}

/* ATTENTION ROWS */
.att-row{display:flex;align-items:center;gap:12px;padding:13px 22px;border-bottom:1px solid var(--bg);transition:all .12s}
.att-row:last-child{border-bottom:none}
.att-row:hover{background:linear-gradient(90deg,var(--blue-soft),transparent 60%)}
.att-name{font-size:13px;font-weight:600;color:var(--ink);flex:1;min-width:0}
.att-name span{display:block;font-size:11px;font-weight:400;color:var(--ink3);margin-top:1px}
.att-arr{font-size:12px;font-weight:600;font-family:'DM Mono',monospace;color:var(--ink2);min-width:60px;text-align:right}
.att-why{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.why-overdue{background:var(--amber-soft);color:var(--amber)}
.why-risk{background:var(--red-soft);color:var(--red)}
.why-tickets{background:var(--blue-soft);color:var(--blue)}
.att-days{font-size:11px;color:var(--ink4);font-family:'DM Mono',monospace;flex-shrink:0;min-width:50px;text-align:right}

/* TEAM TABLE */
.team-row{display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr 1fr;gap:8px;align-items:center;padding:12px 20px;border-bottom:1px solid var(--bg)}
.team-row:last-child{border-bottom:none}
.team-row:hover{background:var(--surface2)}
.team-row.hdr{background:var(--surface2);border-bottom:1px solid var(--border);padding:8px 20px}
.team-row.hdr span{font-size:10px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.07em}
.tr-name{display:flex;align-items:center;gap:8px}
.tr-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.tr-val{font-size:13px;font-weight:500;color:var(--ink2);font-family:'DM Mono',monospace}
.tr-badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px;text-transform:uppercase}
.cso-b{background:var(--blue-soft);color:var(--blue)}
.sa-b{background:var(--green-soft);color:var(--green)}

/* CHURN SUMMARY */
.churn-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border)}
.churn-cell{background:var(--surface);padding:20px 24px}
.churn-q{font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.churn-arr{font-size:24px;font-weight:700;color:var(--red);font-family:'DM Mono',monospace;letter-spacing:-.02em}
.churn-detail{font-size:12px;color:var(--ink3);margin-top:4px}
.churn-clients{display:flex;flex-direction:column;gap:4px;margin-top:10px}
.churn-client{font-size:11px;color:var(--ink2);display:flex;align-items:center;justify-content:space-between}
.churn-client span{font-family:'DM Mono',monospace;color:var(--red);font-size:11px}

/* CHARTS */
.chart-wrap{padding:20px}
.chart-container{position:relative;height:200px}

/* TICKET PRESSURE */
.tp-row{display:flex;align-items:center;gap:10px;padding:11px 20px;border-bottom:1px solid var(--bg)}
.tp-row:last-child{border-bottom:none}
.tp-row:hover{background:var(--surface2)}
.tp-name{font-size:13px;font-weight:600;color:var(--ink);flex:1}
.tp-bar-wrap{flex:1;height:6px;background:var(--surface3);border-radius:3px;overflow:hidden}
.tp-bar{height:100%;border-radius:3px;background:var(--blue);transition:width .5s ease}
.tp-bar.stuck{background:var(--red)}
.tp-count{font-size:12px;font-weight:700;font-family:'DM Mono',monospace;min-width:28px;text-align:right}
.tp-arr{font-size:11px;color:var(--ink3);font-family:'DM Mono',monospace;min-width:52px;text-align:right}

.empty{padding:32px;text-align:center;color:var(--ink3);font-size:13px}
.loading{padding:60px;text-align:center;color:var(--ink3)}
.spinner{width:28px;height:28px;border:2.5px solid var(--surface3);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="brand-mark"><svg width="14" height="14" viewBox="0 0 16 16"><polygon points="8,1 15,4.5 15,11.5 8,15 1,11.5 1,4.5" fill="none" stroke="#fff" stroke-width="1.5"/></svg></div>
    <div class="brand-name"><span>Bitwave</span> · Solutions Overview</div>
  </div>
  <div class="topbar-right">
    <select class="person-sel" id="person-sel" onchange="render()">
      <option value="all">👥 All team</option>
    </select>
    <div class="live-badge"><span class="live-dot"></span><span id="live-label">Loading</span></div>
    <button class="back-btn" onclick="toggleDark()" id="dark-btn">🌙</button>
    <a href="/" class="back-btn">← Dashboard</a>
  </div>
</div>

<div class="page">
  <div class="loading" id="loading"><div class="spinner"></div>Loading overview...</div>
  <div id="content" style="display:none">
    <!-- HERO NAME (shown when person selected) -->
    <div class="hero-name" id="hero-name" style="display:none">
      <div class="hero-av" id="hero-av"></div>
      <div>
        <div class="hero-title" id="hero-title"></div>
        <div class="hero-sub" id="hero-sub"></div>
      </div>
    </div>

    <!-- BIG NUMBERS -->
    <div class="big-nums" id="big-nums"></div>

    <!-- ROW 1: Needs attention + Jira pressure -->
    <div class="sections" id="row1">
      <div class="section">
        <div class="sec-hdr">
          <span class="sec-title">⚠ Needs attention</span>
          <span class="sec-count" id="att-count">0</span>
        </div>
        <div class="sec-body" id="att-list"></div>
      </div>
      <div class="section">
        <div class="sec-hdr">
          <span class="sec-title">🎫 Jira pressure</span>
          <span class="sec-count" id="tp-count">0</span>
        </div>
        <div class="sec-body" id="tp-list"></div>
      </div>
    </div>

    <!-- ROW 2: Team pulse (all view only) + Churn summary -->
    <div class="sections" id="row2">
      <div class="section" id="team-section">
        <div class="sec-hdr"><span class="sec-title">👥 Team pulse</span></div>
        <div class="team-row hdr">
          <span>Person</span><span>Clients</span><span>ARR owned</span><span>Open tickets</span><span>Overdue</span>
        </div>
        <div class="sec-body" id="team-list"></div>
      </div>
      <div class="section">
        <div class="sec-hdr"><span class="sec-title">💀 Churn summary 2026</span></div>
        <div id="churn-summary"></div>
      </div>
    </div>

    <!-- ROW 3: Charts -->
    <div class="sections" id="row3">
      <div class="section">
        <div class="sec-hdr"><span class="sec-title">📊 ARR by lifecycle</span></div>
        <div class="chart-wrap"><div class="chart-container"><canvas id="chart-lifecycle"></canvas></div></div>
      </div>
      <div class="section">
        <div class="sec-hdr"><span class="sec-title">📈 Client status breakdown</span></div>
        <div class="chart-wrap"><div class="chart-container"><canvas id="chart-status"></canvas></div></div>
      </div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://ozkfingocfzrfneijtxc.supabase.co'
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im96a2ZpbmdvY2Z6cmZuZWlqdHhjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNDk5MDgsImV4cCI6MjA5MjYyNTkwOH0.ZzbyZc2_umnpJASFbBNQX-JTdTU5BcW0y8TjLVcQ98E'
const SB = {'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`}
const OWNER_COLORS=['#1a56db','#0e9f6e','#d97706','#7c3aed','#e02424','#0891b2','#be185d','#059669']
const ownerColor=n=>OWNER_COLORS[Math.abs([...(n||'')].reduce((h,c)=>Math.imul(31,h)+c.charCodeAt(0)|0,0))%OWNER_COLORS.length]
const ini=n=>(n||'?').split(' ').map(p=>p[0]).join('').slice(0,2).toUpperCase()
const fARR=n=>{n=Number(n)||0;return n>=1000000?'$'+(n/1e6).toFixed(1)+'M':'$'+(n/1000).toFixed(0)+'k'}
const dSince=d=>!d?9999:Math.floor((Date.now()-new Date(d).getTime())/86400000)
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
const DONE_ST=['done','closed','resolved','sa: task completed','completed']
const isDone=t=>DONE_ST.some(s=>(t.status||'').toLowerCase().includes(s))
const VALID_OWNERS=['payal','lovish','xeres','joan','anthony','chris','kashif','angel','ahtisham','thea','riaz','david','raag','ren','pinhua','jeremy','jesse']
const isValidOwner=n=>{if(!n)return false;const l=n.toLowerCase().trim();if(l.length<3||/\d/.test(l))return false;return VALID_OWNERS.some(v=>l.includes(v))||(/^[a-z]+ ?[a-z]*$/.test(l)&&l.length>=4&&l.length<=25)}

let allClients=[], tickets=[], teamMembers=[], charts={}

function sigWords(s){return s.toLowerCase().split(/[\s\-\/\(\)\[\]]+/).filter(w=>w.length>3)}
function matchType(c,t){
  const name=(c.name||'').toLowerCase(),txt=(t.summary||'').toLowerCase()
  const ns=name.replace(/\s+/g,''),assignee=(t.assignee||'').toLowerCase()
  if(txt.includes(name)||txt.replace(/\s+/g,'').includes(ns))return'exact'
  const emails=[c.ownerEmail,c.saEmail,c.csoEmail,c.owner_email,c.sa_email,c.cso_email].filter(Boolean).map(e=>e.toLowerCase())
  if(emails.some(e=>e===assignee))return'exact'
  const cw=sigWords(name),tw=sigWords(txt)
  if(cw.length>1&&cw.every(w=>txt.includes(w)))return'exact'
  if(cw.some(cw=>tw.some(tw=>tw.includes(cw)||cw.includes(tw))))return'partial'
  return null
}
function cTickets(c){return tickets.filter(t=>!isDone(t)&&matchType(c,t)==='exact')}

function getPersonClients(person) {
  if(!person||person==='all') return allClients.filter(c=>!c.churned)
  const p=person.toLowerCase()
  return allClients.filter(c=>!c.churned&&[c.cso,c.sa,c.owner].some(n=>(n||'').toLowerCase()===p))
}

function getPersonARR(person, clients) {
  if(!person||person==='all') return clients.reduce((s,c)=>s+Number(c.arr||0),0)
  const p=person.toLowerCase()
  return clients.reduce((s,c)=>{
    if((c.cso||'').toLowerCase()===p) return s+Number(c.arr||0)
    if(!c.cso&&((c.sa||c.owner||'').toLowerCase()===p)) return s+Number(c.arr||0)
    return s
  },0)
}

function render() {
  const person = document.getElementById('person-sel').value
  const src = getPersonClients(person)
  const churned = allClients.filter(c=>c.churned)
  const arr = getPersonARR(person, src)
  const openT = src.reduce((s,c)=>s+cTickets(c).length,0)
  const overdue = src.filter(c=>dSince(c.lastContact||c.last_contact)>=(Number(c.threshold)||14))
  const atRisk = src.filter(c=>['at_risk','blocked','Red'].includes(c.status))
  const needsAtt = [...new Set([...overdue,...atRisk])].sort((a,b)=>Number(b.arr||0)-Number(a.arr||0))
  const churnedARR = churned.reduce((s,c)=>s+Number(c.arr||0),0)

  // Hero name
  const heroName = document.getElementById('hero-name')
  if(person&&person!=='all') {
    heroName.style.display='flex'
    const col=ownerColor(person)
    document.getElementById('hero-av').style.background=col+'20'
    document.getElementById('hero-av').style.color=col
    document.getElementById('hero-av').textContent=ini(person)
    document.getElementById('hero-title').textContent=person
    const member=teamMembers.find(m=>m.name.toLowerCase()===person.toLowerCase())
    document.getElementById('hero-sub').textContent=member?`${member.role} · ${member.email||''}`:'Team member'
  } else {
    heroName.style.display='none'
  }

  // Big numbers
  document.getElementById('big-nums').innerHTML=`
    <div class="bn blue">
      <div class="bn-num blue">${fARR(arr)}</div>
      <div class="bn-label">${person&&person!=='all'?'My ARR':'Total active ARR'}</div>
      <div class="bn-sub">${src.length} active clients</div>
      <div class="bn-icon">💰</div>
    </div>
    <div class="bn red">
      <div class="bn-num red">${openT}</div>
      <div class="bn-label">Open tickets</div>
      <div class="bn-sub">${src.filter(c=>cTickets(c).length>0).length} clients affected</div>
      <div class="bn-icon">🎫</div>
    </div>
    <div class="bn amber">
      <div class="bn-num amber">${needsAtt.length}</div>
      <div class="bn-label">Need attention</div>
      <div class="bn-sub">${overdue.length} overdue · ${atRisk.length} at risk</div>
      <div class="bn-icon">⚠️</div>
    </div>
    <div class="bn purple">
      <div class="bn-num purple">${fARR(churnedARR)}</div>
      <div class="bn-label">ARR churned 2026</div>
      <div class="bn-sub">${churned.length} clients lost</div>
      <div class="bn-icon">📉</div>
    </div>`

  // Needs attention
  document.getElementById('att-count').textContent=needsAtt.length
  document.getElementById('att-list').innerHTML=needsAtt.length===0
    ?'<div class="empty">✓ All clients are in good shape</div>'
    :needsAtt.slice(0,10).map(c=>{
      const d=dSince(c.lastContact||c.last_contact),t=Number(c.threshold)||14
      const isOverdue=d>=t,isRisk=['at_risk','blocked','Red'].includes(c.status)
      const owner=c.cso||c.sa||c.owner||'—'
      return `<div class="att-row">
        <div class="att-name">${esc(c.name)}<span>${esc(owner)}${c.inSupport==='yes'||c.in_support?' · 🎧':c.lifecycle==='onboarding'?' · 🚀':''}</span></div>
        ${isRisk?`<span class="att-why why-risk">${c.status.replace('_',' ')}</span>`:''}
        ${isOverdue?`<span class="att-why why-overdue">Overdue</span>`:''}
        <div class="att-arr">${fARR(c.arr)}</div>
        <div class="att-days">${d<9999?d+'d ago':'Never'}</div>
      </div>`
    }).join('')

  // Jira pressure
  const withTickets=src.map(c=>({c,open:cTickets(c)})).filter(x=>x.open.length>0).sort((a,b)=>b.open.length-a.open.length).slice(0,10)
  const maxT=withTickets[0]?.open.length||1
  document.getElementById('tp-count').textContent=withTickets.length
  document.getElementById('tp-list').innerHTML=withTickets.length===0
    ?'<div class="empty">✓ No open tickets</div>'
    :withTickets.map(({c,open})=>{
      const stuck=open.filter(t=>Math.floor((Date.now()-new Date(t.updated).getTime())/86400000)>=7)
      const pct=Math.round((open.length/maxT)*100)
      return `<div class="tp-row">
        <div class="tp-name">${esc(c.name)}</div>
        <div class="tp-bar-wrap"><div class="tp-bar${stuck.length>0?' stuck':''}" style="width:${pct}%"></div></div>
        <div class="tp-count" style="color:${stuck.length>0?'var(--red)':'var(--ink2)'}">${open.length}</div>
        <div class="tp-arr">${fARR(c.arr)}</div>
      </div>`
    }).join('')

  // Team pulse (all view) or hide
  const teamSection=document.getElementById('team-section')
  if(!person||person==='all') {
    teamSection.style.display=''
    const owners=[...new Set(allClients.filter(c=>!c.churned).flatMap(c=>[c.cso,c.sa,c.owner]).filter(isValidOwner))].sort()
    document.getElementById('team-list').innerHTML=owners.map(o=>{
      const oc=allClients.filter(c=>!c.churned&&[c.cso,c.sa,c.owner].some(n=>n===o))
      const oArr=getPersonARR(o,oc)
      const oT=oc.reduce((s,c)=>s+cTickets(c).length,0)
      const oOv=oc.filter(c=>dSince(c.lastContact||c.last_contact)>=(Number(c.threshold)||14)).length
      const member=teamMembers.find(m=>m.name===o)
      const col=ownerColor(o)
      return `<div class="team-row">
        <div class="tr-name">
          <div class="tr-av" style="background:${col}18;color:${col}">${ini(o)}</div>
          <div>
            <div style="font-size:13px;font-weight:600">${esc(o)}</div>
            ${member?`<span class="tr-badge ${member.role==='CSO'?'cso-b':'sa-b'}">${member.role}</span>`:''}
          </div>
        </div>
        <div class="tr-val">${oc.length}</div>
        <div class="tr-val" style="color:var(--green)">${fARR(oArr)}</div>
        <div class="tr-val" style="color:${oT>5?'var(--red)':'var(--ink2)'}">${oT}</div>
        <div class="tr-val" style="color:${oOv>0?'var(--amber)':'var(--green)'}">${oOv>0?oOv+' ⚠':'✓'}</div>
      </div>`
    }).join('')
  } else {
    teamSection.style.display='none'
    document.getElementById('row2').style.gridTemplateColumns='1fr'
  }

  // Churn summary
  const q1=churned.filter(c=>c.churn_date&&c.churn_date<='2026-03-31')
  const q2=churned.filter(c=>c.churn_date&&c.churn_date>'2026-03-31')
  const q1Arr=q1.reduce((s,c)=>s+Number(c.arr||0),0)
  const q2Arr=q2.reduce((s,c)=>s+Number(c.arr||0),0)
  document.getElementById('churn-summary').innerHTML=`
    <div class="churn-grid">
      <div class="churn-cell">
        <div class="churn-q">Q1 2026 (Jan–Mar)</div>
        <div class="churn-arr">${fARR(q1Arr)}</div>
        <div class="churn-detail">${q1.length} clients churned</div>
        <div class="churn-clients">${q1.slice(0,4).map(c=>`<div class="churn-client">${esc(c.name)}<span>${fARR(c.arr)}</span></div>`).join('')}${q1.length>4?`<div style="font-size:11px;color:var(--ink4)">+${q1.length-4} more</div>`:''}</div>
      </div>
      <div class="churn-cell">
        <div class="churn-q">Q2 2026 (Apr–Jun)</div>
        <div class="churn-arr">${fARR(q2Arr)}</div>
        <div class="churn-detail">${q2.length} clients churned</div>
        <div class="churn-clients">${q2.slice(0,4).map(c=>`<div class="churn-client">${esc(c.name)}<span>${fARR(c.arr)}</span></div>`).join('')}${q2.length>4?`<div style="font-size:11px;color:var(--ink4)">+${q2.length-4} more</div>`:''}</div>
      </div>
    </div>`

  // Charts
  renderCharts(src, person)
}

function renderCharts(src, person) {
  // Lifecycle donut
  const inSup=src.filter(c=>c.inSupport==='yes'||c.in_support)
  const inOnboard=src.filter(c=>!c.inSupport&&!c.in_support&&(c.lifecycle==='onboarding'||!c.lifecycle))
  const arrSup=inSup.reduce((s,c)=>s+Number(c.arr||0),0)
  const arrOnb=inOnboard.reduce((s,c)=>s+Number(c.arr||0),0)

  if(charts.lifecycle) charts.lifecycle.destroy()
  charts.lifecycle=new Chart(document.getElementById('chart-lifecycle'),{
    type:'doughnut',
    data:{
      labels:['🎧 In Support','🚀 Onboarding'],
      datasets:[{data:[arrSup,arrOnb],backgroundColor:['#0e9f6e','#1a56db'],borderWidth:0,hoverOffset:4}]
    },
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{family:'DM Sans',size:12},padding:16}},tooltip:{callbacks:{label:ctx=>' '+fARR(ctx.raw)}}}}
  })

  // Status bar
  const statuses=['in_progress','at_risk','blocked','completed','not_started']
  const labels=['In Progress','At Risk','Blocked','Completed','Not Started']
  const colors=['#1a56db','#d97706','#e02424','#0e9f6e','#b8bcc4']
  const counts=statuses.map(s=>src.filter(c=>c.status===s).length)

  if(charts.status) charts.status.destroy()
  charts.status=new Chart(document.getElementById('chart-status'),{
    type:'bar',
    data:{
      labels,
      datasets:[{data:counts,backgroundColor:colors,borderRadius:6,borderSkipped:false}]
    },
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${ctx.raw} clients`}}},scales:{x:{grid:{display:false},ticks:{font:{family:'DM Sans',size:11}}},y:{grid:{color:'rgba(0,0,0,.05)'},ticks:{font:{family:'DM Sans',size:11},stepSize:1}}}}
  })
}

async function loadAll() {
  try {
    // Load clients
    const r1=await fetch(`${SUPABASE_URL}/rest/v1/clients?select=*&order=name.asc`,{headers:SB})
    if(r1.ok) allClients=await r1.json()

    // Load team
    const r2=await fetch(`${SUPABASE_URL}/rest/v1/team_members?select=*&active=eq.true&order=name.asc`,{headers:SB})
    if(r2.ok) teamMembers=await r2.json()

    // Load Jira
    const r3=await fetch('/api/jira')
    if(r3.ok){
      const data=await r3.json()
      if(data.issues) tickets=data.issues.map(i=>({id:i.id,key:i.key,summary:i.fields.summary,status:i.fields.status.name,priority:i.fields.priority?.name||'Medium',project:i.fields.project?.key||'CIB',assignee:i.fields.assignee?.emailAddress||'',created:i.fields.created,updated:i.fields.updated}))
    }

    // Populate person dropdown
    const sel=document.getElementById('person-sel')
    const owners=[...new Set(allClients.filter(c=>!c.churned).flatMap(c=>[c.cso,c.sa,c.owner]).filter(isValidOwner))].sort()
    sel.innerHTML='<option value="all">👥 All team</option>'+owners.map(o=>`<option value="${esc(o)}">${esc(o)}</option>`).join('')

    document.getElementById('loading').style.display='none'
    document.getElementById('content').style.display=''
    document.getElementById('live-label').textContent='Live'
    render()
  } catch(e) {
    document.getElementById('live-label').textContent='Error'
    console.error(e)
  }
}

function toggleDark(){
  const isDark=document.body.classList.toggle('dark')
  localStorage.setItem('bw_dark',isDark?'1':'0')
  document.getElementById('dark-btn').textContent=isDark?'☀️':'🌙'
}
if(localStorage.getItem('bw_dark')==='1'){
  document.body.classList.add('dark')
  document.addEventListener('DOMContentLoaded',()=>{const b=document.getElementById('dark-btn');if(b)b.textContent='☀️'})
}

loadAll()
setInterval(loadAll, 60000)
</script>
